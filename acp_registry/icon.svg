<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE66E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E88A5A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FEE66E;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FEE66E;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f0c12" />
  <!-- Ambient glow -->
  <circle cx="32" cy="28" r="24" fill="url(#glow)" />
  <!-- Sun core -->
  <circle cx="32" cy="28" r="10" fill="url(#gold)" />
  <circle cx="32" cy="28" r="6" fill="#FFF2CC" opacity="0.6" />
  <!-- Sun rays -->
  <line x1="32" y1="12" x2="32" y2="6" stroke="#FEE66E" stroke-width="2.5" stroke-linecap="round" />
  <line x1="32" y1="44" x2="32" y2="50" stroke="#E88A5A" stroke-width="2.5" stroke-linecap="round" />
  <line x1="16" y1="28" x2="10" y2="28" stroke="#FEE66E" stroke-width="2.5" stroke-linecap="round" />
  <line x1="48" y1="28" x2="54" y2="28" stroke="#FEE66E" stroke-width="2.5" stroke-linecap="round" />
  <line x1="20.7" y1="16.7" x2="16.5" y2="12.5" stroke="#E88A5A" stroke-width="2" stroke-linecap="round" />
  <line x1="43.3" y1="16.7" x2="47.5" y2="12.5" stroke="#E88A5A" stroke-width="2" stroke-linecap="round" />
  <line x1="20.7" y1="39.3" x2="16.5" y2="43.5" stroke="#7D796E" stroke-width="2" stroke-linecap="round" />
  <line x1="43.3" y1="39.3" x2="47.5" y2="43.5" stroke="#7D796E" stroke-width="2" stroke-linecap="round" />
  <!-- Lyre base hint -->
  <path d="M26 52 C26 48 38 48 38 52" fill="none" stroke="#4A4E6F" stroke-width="2" stroke-linecap="round" />
  <line x1="32" y1="50" x2="32" y2="58" stroke="#4A4E6F" stroke-width="2" stroke-linecap="round" />
</svg>
